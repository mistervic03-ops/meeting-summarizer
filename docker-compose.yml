services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: meeting-backend
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: meeting-frontend
    ports:
      - "3000:80"
    volumes:
      - ./secrets:/etc/nginx/secrets:ro
    depends_on:
      - backend
    restart: unless-stopped
